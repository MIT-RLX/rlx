[package]
name = "rlx"
version.workspace       = true
edition.workspace       = true
rust-version.workspace = true
description = "RLX — small ML compiler + runtime for transformer inference and training. JAX-shaped IR, autodiff, vmap, on top of CPU / Apple Silicon (Metal / MLX) / NVIDIA / AMD / TPU / wgpu backends. This is the prelude crate; pulls in rlx-ir / rlx-opt / rlx-runtime and re-exports the common types."
authors.workspace       = true
license.workspace       = true
keywords.workspace      = true
categories.workspace    = true
readme                  = "README.md"
repository.workspace    = true
homepage.workspace      = true
documentation.workspace = true

[features]
# Default to CPU only so `cargo add rlx` works on every host without
# extra setup. Pick GPU / accelerator features explicitly.
default = ["cpu"]

# ── Backend features (delegated to rlx-runtime) ─────────────────
cpu             = ["rlx-runtime/cpu"]
metal           = ["rlx-runtime/metal"]
mlx             = ["rlx-runtime/mlx"]
gpu             = ["rlx-runtime/gpu"]
cuda            = ["rlx-runtime/cuda"]
rocm            = ["rlx-runtime/rocm"]
tpu             = ["rlx-runtime/tpu"]
blas-accelerate = ["rlx-runtime/blas-accelerate"]
blas-mkl        = ["rlx-runtime/blas-mkl"]
blas-openblas   = ["rlx-runtime/blas-openblas"]

# ── Optional re-exports of companion crates ─────────────────────
# Off by default — `rlx::models` / `rlx::gguf` / etc. only show up
# when the matching feature is enabled.
models  = ["dep:rlx-models"]
gguf    = ["dep:rlx-gguf"]
bench   = ["dep:rlx-bench"]
sparse  = ["dep:rlx-sparse"]
linalg  = ["dep:rlx-linalg"]
# Specialty targets that don't fit the `Backend` trait (no
# `Session::compile` path through the runtime) — exposed as
# `rlx::cortexm::*` and `rlx::fpga::*` for users who want their
# kernels / codegen surface without a separate dep entry.
cortexm = ["dep:rlx-cortexm"]
fpga    = ["dep:rlx-fpga"]

# ── Convenience aggregates ──────────────────────────────────────
# Single-flag setups for common platforms. Each composes the
# fragments most users want for that target. Aggregates only
# include features that resolve from crates.io — `mlx` and `rocm`
# are git-only (vendor-bundled; see README) and must be opted into
# explicitly when using a git source.
apple-silicon = ["cpu", "metal", "blas-accelerate"]
nvidia        = ["cpu", "cuda"]
edge          = ["cpu", "cortexm"]
all-cpu       = ["cpu", "models", "gguf", "linalg"]

[dependencies]
rlx-ir      = { path = "../rlx-ir",      version = "0.2.0" }
rlx-opt     = { path = "../rlx-opt",     version = "0.2.0" }
rlx-driver  = { path = "../rlx-driver",  version = "0.2.0" }
rlx-macros  = { path = "../rlx-macros",  version = "0.2.0" }
rlx-runtime = { path = "../rlx-runtime", version = "0.2.0", default-features = false }
rlx-models  = { path = "../rlx-models",  version = "0.2.0", optional = true }
rlx-gguf    = { path = "../rlx-gguf",    version = "0.2.0", optional = true }
rlx-bench   = { path = "../rlx-bench",   version = "0.2.0", optional = true }
rlx-sparse  = { path = "../rlx-sparse",  version = "0.2.0", optional = true }
rlx-linalg  = { path = "../rlx-linalg",  version = "0.2.0", optional = true }
# rlx-cortexm is `no_std` by default; we want the host-side parity
# kernels (the `std` feature) when re-exported from the prelude.
rlx-cortexm = { path = "../rlx-cortexm", version = "0.2.0", optional = true, default-features = false, features = ["std"] }
rlx-fpga    = { path = "../rlx-fpga",    version = "0.2.0", optional = true }
# `rlx::Result` / `rlx::Error` type aliases. Every workspace crate
# already pulls anyhow in transitively (rlx-runtime, rlx-models,
# rlx-gguf), so this adds no real bytes — just makes the alias
# expressible without a fragile re-export through one of them.
anyhow = "1"

[lints]
workspace = true

# docs.rs builds in a Linux container without macOS / NVIDIA / AMD /
# TPU toolchains, so we skip the platform-locked backend features and
# enable the cross-platform ones plus all companion modules. Users
# browsing https://docs.rs/rlx see the full IR / opt / runtime API
# along with `rlx::models`, `rlx::gguf`, `rlx::bench`, `rlx::sparse`,
# `rlx::linalg`.
[package.metadata.docs.rs]
features      = ["cpu", "gpu", "models", "gguf", "bench", "sparse", "linalg", "cortexm", "fpga"]
rustdoc-args  = ["--cfg", "docsrs"]
all-features  = false
