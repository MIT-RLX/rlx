[package]
name = "rlx-wgpu"
version.workspace      = true
edition.workspace      = true
rust-version.workspace = true
description = "Cross-platform GPU backend for RLX via wgpu (Metal/Vulkan/DX12/WebGPU)"
authors.workspace      = true
license.workspace      = true
keywords.workspace     = true
categories.workspace   = true
readme                 = "README.md"
repository.workspace   = true
homepage.workspace     = true
documentation.workspace = true
[features]
default = []
native-splat = []
# `Op::GaussianSplatRender` via CPU reference (D2H) when `splat` is enabled.
splat = ["rlx-cpu/splat"]

[dependencies]
rlx-ir = { path = "../rlx-ir", version = "0.2.1" }
rlx-opt = { path = "../rlx-opt", version = "0.2.1" }
rlx-cpu = { path = "../rlx-cpu", version = "0.2.1", features = ["splat"] }

# wgpu 29: brings naga WGSL parser support for `enable f16;` and the
# `f16` type, which unlocks the half-precision storage matmul path.
# We disable defaults and pick backends explicitly: dx12 + gles are
# excluded because wgpu-hal 29.0.3's dx12 path has a type mismatch
# against gpu-allocator 0.28 + windows-rs 0.62.2 (upstream regression
# observed 2026-05). Vulkan covers Windows (RTX/RDNA) and Linux;
# Metal covers macOS.
wgpu = { version = "29", default-features = false, features = [
    "std",
    "parking_lot",
    "vulkan",
    "metal",
    "wgsl",
    "webgpu",
] }
pollster = "0.3"
bytemuck = { version = "1", features = ["derive"] }
half = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"

[lints]
workspace = true
