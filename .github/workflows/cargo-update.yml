# Weekly Cargo.lock refresh (plan #71).
#
# Borrowed from MAX's nightly-lockfile-pin pattern: an automation
# bumps deps on a fixed cadence and commits the resulting lockfile,
# so dep drift is a series of small, observable PRs instead of one
# scary "everything breaks" upgrade later. Tuesday morning UTC keeps
# it off Monday-deploy and Friday-fire-drill days.

name: cargo-update
on:
  schedule:
    - cron: '7 6 * * 2'   # Tuesdays 06:07 UTC
  workflow_dispatch: {}    # also runnable on demand

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        run: |
          rustup update stable
          rustup default stable

      - name: Cargo update
        run: cargo update --workspace

      - name: Build + test
        run: |
          cargo build --release
          cargo test --release

      - name: Open PR if lockfile changed
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore: weekly cargo update"
          title: "chore: weekly cargo update"
          body: |
            Automated weekly `cargo update --workspace`. Workflow:
            `.github/workflows/cargo-update.yml` (plan #71).

            Build + test ran green on this lockfile before this PR
            was opened — review at your leisure.
          branch: bot/cargo-update
          base: main
          delete-branch: true
