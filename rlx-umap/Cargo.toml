[package]
name = "rlx-umap"
version.workspace      = true
edition.workspace      = true
rust-version.workspace = true
description = "Parametric UMAP on RLX — full fit/transform API and k-NN building blocks."
authors.workspace      = true
license.workspace      = true
keywords = ["umap", "knn", "manifold", "rlx", "dim-reduction"]
categories.workspace   = true
readme                 = "README.md"
repository.workspace   = true
homepage.workspace     = true
documentation.workspace = true

[features]
default = ["cpu", "graph", "full", "pca", "nn-descent"]

# Register `OpExtension` + `CpuKernel` for k-NN forward (and backward when `autodiff`).
cpu = ["dep:rlx-ir"]

# `umap.knn_backward` + forward VJP wiring (dense / differentiable paths).
autodiff = ["cpu"]

# Graph helpers (`knn_graph`, `pairwise_cosine_graph`, …).
graph = ["cpu"]

# Backend-specific `umap.knn` executors (host roundtrip on unified memory).
metal = ["cpu", "bench", "dep:rlx-metal", "rlx-runtime/metal"]
mlx = ["cpu", "bench", "dep:rlx-mlx", "rlx-runtime/mlx"]
gpu = ["cpu", "bench", "rlx-runtime/gpu"]
cuda = ["cpu", "bench", "rlx-runtime/cuda"]
rocm = ["cpu", "bench", "rlx-runtime/rocm"]

all-backends = ["metal", "mlx", "gpu", "cuda", "rocm"]

# `examples/bench_knn` and integration tests that call `Session`.
bench = ["graph", "dep:rlx-driver", "dep:rlx-runtime"]

# Full parametric UMAP: `Umap::fit`, `FittedUmap::transform`, sparse training.
full = [
    "graph",
    "bench",
    "autodiff",
    "dep:rlx-autodiff",
    "dep:rlx-compile",
    "dep:serde",
    "dep:serde_json",
    "dep:rand",
    "dep:rayon",
    "dep:ctrlc",
    "dep:crossbeam-channel",
    "rlx-runtime/cpu",
    "pca",
    "nn-descent",
    "serde",
    "safetensors",
    "io-gguf",
]

# Safetensors weight I/O (Hugging Face compatible).
safetensors = ["dep:safetensors"]

# GGUF F32 weight I/O (via `rlx-gguf` loader + native F32 writer).
io-gguf = ["dep:rlx-gguf"]

# PCA warm-start before UMAP loss (fast-umap `pca` feature).
pca = []

# NN-Descent approximate k-NN for n >= 10_000 (fast-umap `nn-descent`).
nn-descent = []

# Serde on config types (re-exported by `full` via dep:serde).
serde = ["dep:serde"]

[dependencies]
rlx-cpu = { path = "../rlx-cpu", version = "0.2.2" }
rlx-ir = { path = "../rlx-ir", version = "0.2.1", optional = true }
rlx-metal = { path = "../rlx-metal", version = "0.2.1", optional = true }
rlx-mlx = { path = "../rlx-mlx", version = "0.2.1", optional = true }
rlx-runtime = { path = "../rlx-runtime", version = "0.2.1", default-features = false, optional = true }
rlx-driver = { path = "../rlx-driver", version = "0.2.1", optional = true }
rlx-autodiff = { path = "../rlx-autodiff", version = "0.2.1", optional = true }
rlx-compile = { path = "../rlx-compile", version = "0.2.1", optional = true }
serde = { version = "1", features = ["derive"], optional = true }
serde_json = { version = "1", optional = true }
rand = { version = "0.9", optional = true }
rayon = { version = "1.10", optional = true }
ctrlc = { version = "3.4", optional = true }
crossbeam-channel = { version = "0.5", optional = true }
safetensors = { version = "0.7", optional = true }
rlx-gguf = { path = "../rlx-gguf", version = "0.2.1", optional = true }

[dev-dependencies]
tempfile = "3.10"
mnist = { version = "0.6.0", git = "https://github.com/eugenehp/mnist.git", features = ["download"] }
rlx-ir = { path = "../rlx-ir", version = "0.2.1" }
rlx-driver = { path = "../rlx-driver", version = "0.2.1" }
rlx-runtime = { path = "../rlx-runtime", version = "0.2.1", default-features = false, features = ["cpu"] }
rlx-autodiff = { path = "../rlx-autodiff", version = "0.2.1" }
rlx-compile = { path = "../rlx-compile", version = "0.2.1" }

[[test]]
name = "knn_reference"

[[test]]
name = "knn_session"
required-features = ["cpu", "bench"]

[[test]]
name = "cosine_parity"
required-features = ["cpu", "graph", "bench"]

[[test]]
name = "backend_parity"
required-features = ["cpu", "graph", "bench"]

[[test]]
name = "umap_fit_cpu"
required-features = ["full"]

[[test]]
name = "forward_reference"
required-features = ["full"]

[[test]]
name = "umap_transform_stats"
required-features = ["full"]

[[test]]
name = "umap_determinism"
required-features = ["full"]

[[test]]
name = "knn_fit_parity"
required-features = ["full", "bench"]

[[example]]
name = "bench_knn"
required-features = ["bench"]

[[example]]
name = "bench_batch"
required-features = ["bench"]

[[example]]
name = "umap_demo"
required-features = ["full"]

[[example]]
name = "bench_umap"
required-features = ["full"]

[[example]]
name = "umap_save_load"
required-features = ["full"]

[[example]]
name = "mnist_embedding"
required-features = ["full"]

[[example]]
name = "training_demo"
required-features = ["full"]

[[bin]]
name = "train-umap"
path = "src/bin/train_umap.rs"
required-features = ["full"]

[lints]
workspace = true
